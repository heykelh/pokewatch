name: Daily price ingestion
on:
  schedule:
    - cron: "30 6 * * *"   # 06h30 UTC chaque jour, après la MAJ Cardmarket
  workflow_dispatch:         # permet le déclenchement manuel pour tester
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/ingest_tcgdex.py
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}