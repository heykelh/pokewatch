name: Daily pipeline
on:
  schedule:
    - cron: "0 11 * * *"   # 11h UTC = 13h en France
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Telechargement + ingestion Price Guide
        id: priceguide
        run: python scripts/download_priceguide.py | tee /tmp/pg.log

      - name: Ingestion watchlist (TCGdex)
        run: python scripts/ingest_tcgdex.py

      - name: Detection des anomalies
        id: detect
        run: python scripts/detect_market.py | tee /tmp/detect.log

      - name: Bilan quotidien
        run: python scripts/generate_report.py

      - name: Notification de succes
        if: success()
        run: |
          SUMMARY=$(grep -E "✓|○" /tmp/pg.log | head -2 | tr '\n' ' ')
          ANOMALIES=$(grep -oE "R7_market_divergence: [0-9]+" /tmp/detect.log | head -1)
          curl -H "Title: PokeWatch OK" \
               -H "Tags: white_check_mark" \
               -H "Priority: low" \
               -d "$SUMMARY
          $ANOMALIES" \
               "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      - name: Notification d'echec
        if: failure()
        run: |
          curl -H "Title: PokeWatch EN ECHEC" \
               -H "Tags: rotating_light" \
               -H "Priority: urgent" \
               -H "Actions: view, Voir le run, https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               -d "Le pipeline quotidien a echoue. Un jour de collecte risque d'etre perdu." \
               "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
